<header xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        th:fragment="header"
        class="site-header">
  <div class="header-inner">
    <a class="logo" th:href="@{/}">SongWoo Portfolio</a>

    <nav class="nav">
      <a th:href="@{/}">Home</a>
      <a th:href="@{/profile}">Profile</a>
      <a th:href="@{/resume}">Resume</a>
      <a th:href="@{/skills}">Skills</a>
      <a th:href="@{/projects}">Projects</a>
      <a th:href="@{/certificates}">Certificates</a>
      <a th:href="@{/admin}">Admin</a>

      <a sec:authorize="isAnonymous()"
         th:href="@{/login}">
        Login
      </a>

      <a sec:authorize="isAuthenticated()"
         th:href="@{/profile}">
        My Info
      </a>

      <form sec:authorize="isAuthenticated()"
            class="nav-logout-form"
            method="post"
            th:action="@{/logout}">
        <button type="submit" class="nav-logout-button">
          Logout
        </button>
      </form>
    </nav>
  </div>
</header>
