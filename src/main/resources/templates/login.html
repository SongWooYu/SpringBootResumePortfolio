<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | SongWoo Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{module/header :: header}"></div>

<main class="container auth-page">
    <section class="page-header">
        <p class="eyebrow">Admin Login</p>
        <h1>관리자 로그인</h1>
        <p>
            프로젝트, 자격증, 프로필 정보를 관리하려면 관리자 계정으로 로그인해야 합니다.
        </p>
    </section>

    <form class="form-card login-card"
          method="post"
          th:action="@{/login}">

        <div class="alert error-alert" th:if="${param.error}">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <div class="alert success-alert" th:if="${param.logout}">
            로그아웃되었습니다.
        </div>

        <div class="form-field">
            <label for="username">아이디</label>
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="admin"
                   autocomplete="username">
        </div>

        <div class="form-field">
            <label for="password">비밀번호</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="admin1234"
                   autocomplete="current-password">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary">로그인</button>
            <a class="btn secondary" th:href="@{/}">홈으로</a>
        </div>

        <div class="login-help">
            <p>과제용 관리자 계정</p>
            <code>admin / admin1234</code>
        </div>
    </form>
</main>

<div th:replace="~{module/footer :: footer}"></div>

</body>
</html>
