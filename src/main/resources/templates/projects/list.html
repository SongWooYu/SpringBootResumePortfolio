<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Projects | SongWoo Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{module/header :: header}"></div>

<main class="container">
    <section class="page-header">
        <p class="eyebrow">Projects</p>
        <h1>프로젝트 목록</h1>
        <p>
            개발 경험과 구현 결과물을 카드 형태로 정리하는 페이지입니다.
        </p>
    </section>

    <section class="toolbar">
        <form class="search-form" method="get" th:action="@{/projects}">
            <input type="text"
                   name="keyword"
                   placeholder="프로젝트명 또는 기술 검색"
                   th:value="${keyword}">
            <button type="submit">검색</button>
        </form>

        <a class="btn primary" th:href="@{/admin/projects/add}">프로젝트 등록</a>
    </section>

    <section class="result-summary">
        <p th:if="${keyword == null or #strings.isEmpty(keyword)}">
            전체 프로젝트
            <strong th:text="${projectCount}">0</strong>개를 표시합니다.
        </p>

        <p th:if="${keyword != null and !#strings.isEmpty(keyword)}">
            검색어
            <strong th:text="${keyword}">keyword</strong>
            에 대한 결과
            <strong th:text="${projectCount}">0</strong>개를 표시합니다.
            <a class="text-link" th:href="@{/projects}">전체 목록 보기</a>
        </p>
    </section>

    <section class="empty-state" th:if="${#lists.isEmpty(projects)}">
        <h2>검색 결과가 없습니다.</h2>
        <p>다른 키워드로 다시 검색하십시오.</p>
    </section>

    <section class="content-grid three-columns" th:if="${!#lists.isEmpty(projects)}">
        <article class="content-card project-card" th:each="project : ${projects}">
            <p class="card-label" th:text="${project.category}">Spring Boot</p>

            <h2 th:text="${project.title}">프로젝트명</h2>

            <p th:text="${project.summary}">
                프로젝트 요약
            </p>

            <p class="subtle-text" th:text="${project.techStack}">
                Java, Spring Boot
            </p>

            <a class="text-link"
               th:href="@{/projects/{projectId}(projectId=${project.projectId})}">
                상세 보기
            </a>
        </article>
    </section>
</main>

<div th:replace="~{module/footer :: footer}"></div>

</body>
</html>
