<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Certificates | SongWoo Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{module/header :: header}"></div>

<main class="container">
    <div class="flash-message" th:if="${message}" th:text="${message}">
        처리되었습니다.
    </div>

    <section class="page-header">
        <p class="eyebrow">Certificates</p>
        <h1>자격증 및 수료 내역</h1>
        <p>
            자격증, 교육 수료, 활동 증빙 이미지를 관리하고 표시하는 페이지입니다.
        </p>
    </section>

    <section class="toolbar">
        <p class="subtle-text">마스킹된 자격증 이미지와 자격 취득 정보를 표시합니다.</p>
        <a class="btn primary" th:href="@{/admin/certificates/add}">자격증 등록</a>
    </section>

    <section class="empty-state" th:if="${#lists.isEmpty(certificates)}">
        <h2>등록된 자격증이 없습니다.</h2>
        <p>관리자 페이지에서 자격증 정보를 등록하십시오.</p>
    </section>

    <section class="content-grid two-columns" th:if="${!#lists.isEmpty(certificates)}">
        <article class="content-card certificate-card" th:each="certificate : ${certificates}">
            <div class="certificate-image-wrap"
                 th:if="${certificate.imagePath != null and !#strings.isEmpty(certificate.imagePath)}">
                <img class="certificate-image"
                     th:src="@{${certificate.imagePath}}"
                     th:alt="${certificate.name}">
            </div>

            <div class="certificate-image-placeholder"
                 th:if="${certificate.imagePath == null or #strings.isEmpty(certificate.imagePath)}">
                No Image
            </div>

            <p class="card-label" th:text="${certificate.certificateId}">CERT001</p>

            <h2 th:text="${certificate.name}">자격증명</h2>

            <p>
                발급기관:
                <span th:text="${certificate.issuer}">발급기관</span>
            </p>

            <p>
                취득일:
                <span th:text="${certificate.acquiredDate}">취득일</span>
            </p>

            <p th:text="${certificate.description}">
                설명
            </p>
        </article>
    </section>
</main>

<div th:replace="~{module/footer :: footer}"></div>

</body>
</html>
